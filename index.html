<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码编辑器 - 预览与导出</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/docx@8.5.0/build/index.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* 顶栏 */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
  gap: 8px;
}
.topbar h1 { font-size: 15px; font-weight: 600; color: #cba6f7; white-space: nowrap; }
.btn-group { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; }

button {
  padding: 6px 14px;
  border: 1px solid #45475a;
  border-radius: 6px;
  background: #313244;
  color: #cdd6f4;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
button:hover { background: #45475a; }
button.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; font-weight: 600; }
button.primary:hover { background: #74c7ec; }
button.green { background: #a6e3a1; color: #1e1e2e; border-color: #a6e3a1; font-weight: 600; }
button.green:hover { background: #94e2d5; }

/* 项目名输入 */
.project-input {
  padding: 5px 10px;
  border: 1px solid #45475a;
  border-radius: 6px;
  background: #313244;
  color: #cdd6f4;
  font-size: 13px;
  width: 160px;
  outline: none;
}
.project-input:focus { border-color: #89b4fa; }
.project-input::placeholder { color: #6c7086; }

/* 标签栏 */
.tabs {
  display: flex;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}
.tab {
  padding: 8px 20px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: #6c7086;
  transition: all 0.15s;
  user-select: none;
}
.tab:hover { color: #cdd6f4; }
.tab.active { color: #89b4fa; border-bottom-color: #89b4fa; background: #1e1e2e; }

/* 主区域 */
.main { flex: 1; display: flex; overflow: hidden; }

.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #313244;
  min-width: 0;
}
.editor-pane textarea {
  flex: 1;
  width: 100%;
  padding: 14px;
  background: #1e1e2e;
  color: #cdd6f4;
  border: none;
  outline: none;
  resize: none;
  font-family: "Cascadia Code","Fira Code",Consolas,monospace;
  font-size: 14px;
  line-height: 1.6;
  tab-size: 2;
}

.preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: #fff;
}
.preview-label {
  padding: 8px 16px;
  font-size: 12px;
  color: #6c7086;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}
.preview-pane iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* 导出菜单 */
.export-wrap { position: relative; }
.export-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 4px;
  background: #313244;
  border: 1px solid #45475a;
  border-radius: 8px;
  padding: 4px 0;
  z-index: 999;
  min-width: 200px; /* ★ 稍微加宽以容纳两个 Word 选项 */
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.export-menu.show { display: block; }
.export-menu button {
  display: block; width: 100%; text-align: left;
  padding: 8px 16px; border: none; border-radius: 0;
  background: transparent; color: #cdd6f4; font-size: 13px;
}
.export-menu button:hover { background: #45475a; }

/* ★ 菜单分割线 */
.export-menu .menu-divider {
  height: 1px;
  background: #45475a;
  margin: 4px 0;
}

/* 底栏 */
.bottombar {
  padding: 4px 16px;
  font-size: 12px;
  color: #6c7086;
  background: #181825;
  border-top: 1px solid #313244;
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}

/* 加载遮罩 */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 9998;
  justify-content: center;
  align-items: center;
  flex-direction: column;
  gap: 12px;
}
.overlay.show { display: flex; }
.spinner {
  width: 40px; height: 40px;
  border: 3px solid #45475a;
  border-top-color: #89b4fa;
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
}
.overlay-text { color: #cdd6f4; font-size: 14px; }
@keyframes spin { to { transform: rotate(360deg); } }

@media (max-width: 700px) {
  .main { flex-direction: column; }
  .editor-pane { border-right: none; border-bottom: 2px solid #313244; }
  .project-input { width: 100px; }
}
</style>
</head>
<body>

<div class="topbar">
  <h1>⚡ 代码编辑器</h1>
  <div class="btn-group">
    <input class="project-input" id="projectName" placeholder="项目名称..." value="我的项目">
    <button class="primary" onclick="runPreview()">▶ 运行</button>
    <button onclick="clearAll()">清空</button>
    <button onclick="copyCode()">复制</button>
    <div class="export-wrap">
      <button class="green" onclick="toggleMenu()">📦 导出 ▾</button>
      <div class="export-menu" id="exportMenu">
        <button onclick="doExport('html')">🌐 HTML (.html)</button>
        <button onclick="doExport('pdf')">📄 PDF (.pdf)</button>
        <!-- ★ 新增：DOC 与 DOCX 分开列出，中间加分割线 -->
        <button onclick="doExport('doc')">📝 Word 兼容版 (.doc)</button>
        <button onclick="doExport('docx')">📝 Word 现代版 (.docx)</button>
        <div class="menu-divider"></div>
        <button onclick="doExport('excel')">📊 Excel (.xlsx)</button>
        <button onclick="doExport('ppt')">📽️ PPT (.ppt)</button>
      </div>
    </div>
  </div>
</div>

<div class="tabs">
  <div class="tab active" data-lang="html" onclick="switchTab(this)">HTML</div>
  <div class="tab" data-lang="css" onclick="switchTab(this)">CSS</div>
  <div class="tab" data-lang="js" onclick="switchTab(this)">JavaScript</div>
</div>

<div class="main">
  <div class="editor-pane">
    <textarea id="editor" spellcheck="false" placeholder="在这里写代码，点击运行查看效果..."></textarea>
  </div>
  <div class="preview-pane">
    <div class="preview-label">预览区域</div>
    <iframe id="preview"></iframe>
  </div>
</div>

<div class="bottombar">
  <span id="statusInfo">HTML | 0 字符</span>
  <span>UTF-8</span>
</div>

<!-- 加载遮罩 -->
<div class="overlay" id="overlay">
  <div class="spinner"></div>
  <div class="overlay-text" id="overlayText">正在导出...</div>
</div>

<script>
// ===================== 状态 =====================
const code = {
  html: `<!DOCTYPE html>
<html>
<head>
<style>
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; margin: 0;
    background: linear-gradient(135deg, #667eea, #764ba2);
    font-family: "Microsoft YaHei", sans-serif;
  }
  .card {
    background: #fff; padding: 48px 64px; border-radius: 16px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.3); text-align: center;
    max-width: 500px;
  }
  h1 { color: #333; margin-bottom: 12px; font-size: 28px; }
  p { color: #777; line-height: 1.6; margin-bottom: 20px; }
  table {
    width: 100%; border-collapse: collapse; margin: 20px 0;
    text-align: left;
  }
  th { background: #667eea; color: #fff; padding: 10px 14px; }
  td { padding: 10px 14px; border-bottom: 1px solid #eee; color: #555; }
  tr:hover td { background: #f8f8ff; }
  .btn {
    padding: 12px 32px; background: #667eea; color: #fff;
    border: none; border-radius: 8px; font-size: 15px;
    cursor: pointer; margin-top: 10px;
  }
  .btn:hover { background: #5a6fd6; }
</style>
</head>
<body>
  <div class="card">
    <h1>🚀 项目概览</h1>
    <p>这是一个代码编辑器示例，支持实时预览和多格式导出。</p>
    <table>
      <thead>
        <tr><th>功能</th><th>状态</th><th>说明</th></tr>
      </thead>
      <tbody>
        <tr><td>代码编辑</td><td>✅ 就绪</td><td>HTML/CSS/JS 三栏</td></tr>
        <tr><td>实时预览</td><td>✅ 就绪</td><td>iframe 渲染</td></tr>
        <tr><td>导出 DOCX</td><td>✅ 就绪</td><td>完整章节结构</td></tr>
        <tr><td>导出 PDF</td><td>✅ 就绪</td><td>截图转 A4</td></tr>
        <tr><td>导出 Excel</td><td>✅ 就绪</td><td>自动提取表格</td></tr>
      </tbody>
    </table>
    <button class="btn" onclick="alert('一切正常！')">测试按钮</button>
  </div>
</body>
</html>`,
  css: '',
  js: ''
};

let currentLang = 'html';
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

editor.value = code.html;
updateStatus();
setTimeout(runPreview, 150);

// ===================== 编辑器 =====================
function switchTab(tab) {
  code[currentLang] = editor.value;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentLang = tab.dataset.lang;
  editor.value = code[currentLang];
  updateStatus();
}

function updateStatus() {
  document.getElementById('statusInfo').textContent =
    `${currentLang.toUpperCase()} | ${editor.value.length} 字符`;
}

editor.addEventListener('input', () => { code[currentLang] = editor.value; updateStatus(); });
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    code[currentLang] = editor.value;
  }
});

// ===================== 预览 =====================
function runPreview() {
  code[currentLang] = editor.value;
  const doc = preview.contentDocument;
  doc.open(); doc.write(buildHTML()); doc.close();
}

function buildHTML() {
  let html = code.html.trim();
  if (html.match(/<html[\s>]/i)) {
    if (code.css.trim()) {
      const s = `<style>${code.css}</style>`;
      html = html.includes('</head>') ? html.replace('</head>', s + '</head>') : s + html;
    }
    if (code.js.trim()) {
      const s = `<script>${code.js}<\/script>`;
      html = html.includes('</body>') ? html.replace('</body>', s + '</body>') : html + s;
    }
    return html;
  }
  return `<!DOCTYPE html><html><head><meta charset="UTF-8"><style>${code.css}</style></head><body>${html}<script>${code.js}<\/script></body></html>`;
}

// ===================== 工具 =====================
function clearAll() {
  if (!confirm('确定清空所有内容？')) return;
  code.html = ''; code.css = ''; code.js = '';
  editor.value = ''; updateStatus();
  const d = preview.contentDocument; d.open(); d.write(''); d.close();
}

function copyCode() {
  navigator.clipboard.writeText(editor.value)
    .then(() => showMsg('已复制 ✓'))
    .catch(() => { editor.select(); document.execCommand('copy'); showMsg('已复制 ✓'); });
}

function showMsg(text) {
  const old = document.getElementById('_toast'); if (old) old.remove();
  const d = document.createElement('div'); d.id = '_toast'; d.textContent = text;
  Object.assign(d.style, {
    position:'fixed', top:'16px', left:'50%', transform:'translateX(-50%)',
    padding:'10px 24px', background:'#a6e3a1', color:'#1e1e2e', borderRadius:'8px',
    fontWeight:'600', fontSize:'14px', zIndex:'9999', boxShadow:'0 4px 16px rgba(0,0,0,0.3)'
  });
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 2500);
}

function showLoading(text) {
  document.getElementById('overlayText').textContent = text || '正在导出...';
  document.getElementById('overlay').classList.add('show');
}
function hideLoading() { document.getElementById('overlay').classList.remove('show'); }

function toggleMenu() { document.getElementById('exportMenu').classList.toggle('show'); }
document.addEventListener('click', (e) => {
  if (!e.target.closest('.export-wrap'))
    document.getElementById('exportMenu').classList.remove('show');
});

function getProjectName() {
  return document.getElementById('projectName').value.trim() || '我的项目';
}

function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

// ===================== 导出路由 =====================
function doExport(type) {
  document.getElementById('exportMenu').classList.remove('show');
  code[currentLang] = editor.value;
  switch(type) {
    case 'html':  exportHTML();  break;
    case 'pdf':   exportPDF();   break;
    case 'doc':   exportDOC();   break;  // ★ 新增 DOC 路由
    case 'docx':  exportDOCX();  break;
    case 'excel': exportExcel(); break;
    case 'ppt':   exportPPT();   break;
  }
}

// ===================== 导出 HTML =====================
function exportHTML() {
  const blob = new Blob([buildHTML()], { type: 'text/html;charset=utf-8' });
  saveAs(blob, getProjectName() + '.html');
  showMsg('HTML 已导出 ✓');
}

// ===================== 导出 PDF =====================
function exportPDF() {
  showLoading('正在生成 PDF...');
  capturePreview(1200, null).then(canvas => {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('p', 'mm', 'a4');
    const pw = 210, ph = 297, margin = 10;
    const usableW = pw - margin * 2;
    const imgH = (canvas.height * usableW) / canvas.width;

    let srcY = 0;
    const usableH = ph - margin * 2;
    const pageHeightPx = (usableH / imgH) * canvas.height;
    let page = 0;

    while (srcY < canvas.height) {
      if (page > 0) pdf.addPage();
      const sliceH = Math.min(pageHeightPx, canvas.height - srcY);
      const tmpCanvas = document.createElement('canvas');
      tmpCanvas.width = canvas.width;
      tmpCanvas.height = sliceH;
      tmpCanvas.getContext('2d').drawImage(canvas, 0, srcY, canvas.width, sliceH, 0, 0, canvas.width, sliceH);
      const imgData = tmpCanvas.toDataURL('image/png');
      const drawH = (sliceH * usableW) / canvas.width;
      pdf.addImage(imgData, 'PNG', margin, margin, usableW, drawH);
      srcY += pageHeightPx;
      page++;
    }

    pdf.save(getProjectName() + '.pdf');
    hideLoading();
    showMsg('PDF 已导出 ✓');
  }).catch(() => { hideLoading(); showMsg('PDF 导出失败'); });
}

// ===================== ★ 导出 DOC（HTML-in-Word 兼容格式） =====================
/**
 * .doc 本质是让 Word 用 HTML 模式打开的 MIME 文档。
 * 优点：无需额外库，兼容 Word 2003+，文件体积小。
 * 包含：封面、预览文本、表格数据、源代码，全部以 Word XML 样式排版。
 */
function exportDOC() {
  showLoading('正在生成 Word 兼容版 (.doc)...');

  setTimeout(() => {
    try {
      const name    = getProjectName();
      const nowStr  = new Date().toLocaleString('zh-CN');
      const tableData  = extractTablesFromPreview();
      const previewTxt = extractTextFromPreview();

      // ---- 构建表格 HTML ----
      let tablesHTML = '';
      if (tableData.length > 0) {
        tableData.forEach((tbl, idx) => {
          tablesHTML += `<h2>表格 ${idx + 1}</h2>`;
          tablesHTML += '<table border="1" cellspacing="0" cellpadding="6" style="border-collapse:collapse;width:100%;font-size:11pt;">';
          tbl.forEach((row, ri) => {
            tablesHTML += '<tr>';
            row.forEach(cell => {
              if (ri === 0) {
                tablesHTML += `<th style="background:#4A56E2;color:#fff;padding:8px 12px;">${esc(cell)}</th>`;
              } else {
                tablesHTML += `<td style="padding:6px 12px;border:1px solid #ccc;">${esc(cell)}</td>`;
              }
            });
            tablesHTML += '</tr>';
          });
          tablesHTML += '</table><br>';
        });
      }

      // ---- 构建代码块 HTML ----
      let codeHTML = '';
      const codeMap = { html: 'HTML', css: 'CSS', js: 'JavaScript' };
      for (const [lang, label] of Object.entries(codeMap)) {
        if (code[lang].trim()) {
          codeHTML += `<h2>${label} 代码</h2>`;
          codeHTML += `<pre style="background:#f5f5f5;padding:12px;font-family:Consolas,monospace;
                        font-size:9pt;border:1px solid #ddd;border-radius:4px;
                        white-space:pre-wrap;word-break:break-all;">${esc(code[lang])}</pre>`;
        }
      }

      // ---- 组装完整 Word HTML 文档 ----
      // mso-* 属性是 Microsoft Office 专用排版指令，确保在 Word 中正确分页和样式
      const docContent = `
<html xmlns:o="urn:schemas-microsoft-com:office:office"
      xmlns:w="urn:schemas-microsoft-com:office:word"
      xmlns="http://www.w3.org/TR/REC-html40">
<head>
  <meta charset="UTF-8">
  <title>${esc(name)}</title>
  <!--[if gte mso 9]>
  <xml>
    <w:WordDocument>
      <w:View>Print</w:View>
      <w:Zoom>100</w:Zoom>
      <w:DoNotOptimizeForBrowser/>
    </w:WordDocument>
  </xml>
  <![endif]-->
  <style>
    /* 页面设置：A4 纸，页边距 2.54cm */
    @page WordSection1 {
      size: 21cm 29.7cm;
      margin: 2.54cm 3.17cm 2.54cm 3.17cm;
      mso-header-margin: 1.5cm;
      mso-footer-margin: 1.75cm;
      mso-paper-source: 0;
    }
    body {
      font-family: "Microsoft YaHei", "SimSun", sans-serif;
      font-size: 12pt;
      color: #333;
      div { mso-element: para-border-div; }
    }
    /* 标题样式 */
    h1 {
      font-size: 22pt;
      color: #4A56E2;
      font-weight: bold;
      margin: 24pt 0 12pt;
      border-bottom: 2px solid #4A56E2;
      padding-bottom: 6pt;
      mso-style-name: "标题 1";
    }
    h2 {
      font-size: 14pt;
      color: #333;
      font-weight: bold;
      margin: 18pt 0 8pt;
      mso-style-name: "标题 2";
    }
    h3 {
      font-size: 12pt;
      color: #555;
      font-weight: bold;
      margin: 12pt 0 6pt;
    }
    p {
      font-size: 11pt;
      line-height: 1.8;
      margin: 6pt 0;
      text-align: justify;
    }
    /* 封面样式 */
    .cover {
      text-align: center;
      padding: 80pt 0 60pt;
      page-break-after: always;  /* Word 分页 */
      mso-break-type: section-break;
    }
    .cover-title {
      font-size: 36pt;
      font-weight: bold;
      color: #4A56E2;
      display: block;
      margin-bottom: 16pt;
    }
    .cover-sub {
      font-size: 16pt;
      color: #888;
      display: block;
      margin-bottom: 10pt;
    }
    .cover-date {
      font-size: 11pt;
      color: #aaa;
    }
    /* 信息框 */
    .info-box {
      background: #f0f4ff;
      border-left: 4px solid #4A56E2;
      padding: 10pt 14pt;
      margin: 12pt 0;
      font-size: 11pt;
    }
    /* 表格 */
    table {
      border-collapse: collapse;
      width: 100%;
      margin: 10pt 0;
      font-size: 10.5pt;
    }
    th {
      background: #4A56E2;
      color: #fff;
      padding: 8px 12px;
      font-weight: bold;
      text-align: left;
    }
    td {
      padding: 6px 12px;
      border: 1px solid #ccc;
      color: #444;
    }
    tr:nth-child(even) td { background: #f8f8ff; }
    /* 代码块 */
    pre {
      background: #f5f5f5;
      border: 1px solid #ddd;
      padding: 10pt 12pt;
      font-family: Consolas, "Courier New", monospace;
      font-size: 9pt;
      color: #2d2d2d;
      white-space: pre-wrap;
      word-break: break-all;
      line-height: 1.5;
      margin: 8pt 0;
    }
    /* 页脚 */
    .footer-note {
      font-size: 9pt;
      color: #aaa;
      text-align: center;
      margin-top: 40pt;
      border-top: 1px solid #eee;
      padding-top: 8pt;
    }
  </style>
</head>
<body>

  <!-- 封面 -->
  <div class="cover">
    <span class="cover-title">${esc(name)}</span>
    <span class="cover-sub">代码编辑器导出文档</span>
    <span class="cover-date">导出时间：${nowStr}</span>
  </div>

  <!-- 第一章：项目概述 -->
  <h1>第一章 项目概述</h1>
  <div class="info-box">
    本文档由「代码编辑器」自动生成，包含项目「${esc(name)}」的完整代码内容及相关数据摘要。
  </div>

// ===================== 导出 DOCX（原有逻辑，保持不变） =====================
async function exportDOCX() {
  showLoading('正在生成 Word 文档...');

  try {
    const {
      Document, Packer, Paragraph, TextRun, HeadingLevel,
      Table, TableRow, TableCell, WidthType, BorderStyle,
      AlignmentType, ImageRun, ShadingType, PageBreak
    } = docx;

    const name = getProjectName();
    const now = new Date().toLocaleString('zh-CN');

    // ---- 截取预览图 ----
    let screenshotBase64 = null;
    let imgWidth = 600, imgHeight = 400;
    try {
      const canvas = await capturePreview(1200, null);
      screenshotBase64 = canvas.toDataURL('image/png').split(',')[1];
      imgWidth = canvas.width;
      imgHeight = canvas.height;
    } catch(e) { console.warn('截图失败', e); }

    // ---- 提取预览中的表格数据 ----
    const tableData = extractTablesFromPreview();

    // ---- 提取预览中的纯文本 ----
    const previewText = extractTextFromPreview();

    // ---- 构建文档章节内容 ----
    const children = [];

    // == 封面标题 ==
    children.push(
      new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { before: 600, after: 200 },
        children: [new TextRun({ text: name, bold: true, size: 56, color: '4A56E2', font: 'Microsoft YaHei' })]
      }),
      new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { after: 100 },
        children: [new TextRun({ text: '代码编辑器导出文档', size: 28, color: '888888', font: 'Microsoft YaHei' })]
      }),
      new Paragraph({
        alignment: AlignmentType.CENTER,
        spacing: { after: 400 },
        children: [new TextRun({ text: `导出时间：${now}`, size: 20, color: 'AAAAAA', font: 'Microsoft YaHei' })]
      }),
      new Paragraph({ children: [new TextRun({ text: '', break: 1 })] })
    );

    // == 第一章：项目概述 ==
    children.push(
      createHeading('第一章 项目概述', HeadingLevel.HEADING_1),
      createBody(`本文档由「代码编辑器」自动生成，包含项目「${name}」的完整代码内容、预览截图及相关数据。`),
      createBody(`文档生成时间：${now}。以下内容分为代码部分、预览效果和数据摘要三个主要章节。`),
      createEmpty()
    );

    // == 第二章：预览效果 ==
    children.push(createHeading('第二章 预览效果', HeadingLevel.HEADING_1));

    if (screenshotBase64) {
      const maxW = 580;
      const ratio = imgHeight / imgWidth;
      const drawW = Math.min(maxW, imgWidth);
      const drawH = drawW * ratio;

      children.push(
        createBody('以下为页面预览截图：'),
        new Paragraph({
          alignment: AlignmentType.CENTER,
          spacing: { before: 200, after: 200 },
          children: [
            new ImageRun({
              data: Uint8Array.from(atob(screenshotBase64), c => c.charCodeAt(0)),
              transformation: { width: drawW, height: Math.min(drawH, 700) },
              type: 'png'
            })
          ]
        })
      );
    } else {
      children.push(createBody('（预览截图生成失败，请在浏览器中运行预览查看效果）'));
    }

    if (previewText.trim()) {
      children.push(
        createHeading('2.1 页面文本内容', HeadingLevel.HEADING_2),
        createBody(previewText.substring(0, 3000))
      );
    }
    children.push(createEmpty());

    // == 第三章：数据表格 ==
    if (tableData.length > 0) {
      children.push(
        createHeading('第三章 数据表格', HeadingLevel.HEADING_1),
        createBody(`页面中共检测到 ${tableData.length} 个表格，以下为提取内容：`)
      );

      tableData.forEach((tbl, idx) => {
        children.push(createHeading(`3.${idx + 1} 表格 ${idx + 1}`, HeadingLevel.HEADING_2));

        if (tbl.length > 0) {
          const docTable = new Table({
            width: { size: 100, type: WidthType.PERCENTAGE },
            rows: tbl.map((row, ri) =>
              new TableRow({
                children: row.map(cell =>
                  new TableCell({
                    width: { size: Math.floor(100 / row.length), type: WidthType.PERCENTAGE },
                    shading: ri === 0 ? { type: ShadingType.SOLID, color: '4A56E2' } : undefined,
                    children: [
                      new Paragraph({
                        children: [new TextRun({
                          text: cell || ' ',
                          bold: ri === 0,
                          color: ri === 0 ? 'FFFFFF' : '333333',
                          size: 20,
                          font: 'Microsoft YaHei'
                        })]
                      })
                    ]
                  })
                )
              })
            )
          });
          children.push(docTable);
        }
        children.push(createEmpty());
      });
    }

    // == 源代码章节 ==
    children.push(
      createHeading(tableData.length > 0 ? '第四章 源代码' : '第三章 源代码', HeadingLevel.HEADING_1),
      createBody('以下为编辑器中的完整源代码内容。')
    );

    const codeMap = { html: 'HTML', css: 'CSS', js: 'JavaScript' };
    const chapterBase = tableData.length > 0 ? 4 : 3;
    let secIdx = 1;

    for (const [lang, label] of Object.entries(codeMap)) {
      if (code[lang].trim()) {
        children.push(createHeading(`${chapterBase}.${secIdx} ${label} 代码`, HeadingLevel.HEADING_2));
        code[lang].split('\n').forEach(line => {
          children.push(
            new Paragraph({
              spacing: { before: 0, after: 0, line: 276 },
              shading: { type: ShadingType.SOLID, color: 'F5F5F5' },
              children: [new TextRun({ text: line || ' ', font: 'Consolas', size: 18, color: '2D2D2D' })]
            })
          );
        });
        children.push(createEmpty());
        secIdx++;
      }
    }

    // == 附录 ==
    children.push(
      createHeading('附录', HeadingLevel.HEADING_1),
      createBody(`本文档由代码编辑器自动生成。`),
      createBody(`项目名称：${name}`),
      createBody(`生成时间：${now}`),
      createBody(`HTML 代码：${code.html.length} 字符`),
      createBody(`CSS 代码：${code.css.length} 字符`),
      createBody(`JavaScript 代码：${code.js.length} 字符`)
    );

    // ---- 创建文档 ----
    const doc = new Document({
      creator: '代码编辑器',
      title: name,
      description: '由代码编辑器自动导出的文档',
      styles: {
        default: {
          document: { run: { font: 'Microsoft YaHei', size: 22 } }
        }
      },
      sections: [{
        properties: {
          page: { margin: { top: 1440, bottom: 1440, left: 1440, right: 1440 } }
        },
        children: children
      }]
    });

    const blob = await Packer.toBlob(doc);
    saveAs(blob, `${name}.docx`);
    hideLoading();
    showMsg('Word (.docx) 已导出 ✓');

  } catch (err) {
    console.error('DOCX 导出错误:', err);
    hideLoading();
    showMsg('导出失败: ' + err.message);
  }
}

// DOCX 辅助函数
function createHeading(text, level) {
  return new docx.Paragraph({
    heading: level,
    spacing: { before: 360, after: 160 },
    children: [new docx.TextRun({
      text, bold: true, font: 'Microsoft YaHei',
      color: level === docx.HeadingLevel.HEADING_1 ? '4A56E2' : '333333'
    })]
  });
}
function createBody(text) {
  return new docx.Paragraph({
    spacing: { before: 80, after: 80 },
    children: [new docx.TextRun({ text, font: 'Microsoft YaHei', size: 22, color: '444444' })]
  });
}
function createEmpty() {
  return new docx.Paragraph({ children: [] });
}

function exportExcel() {

    ws['!cols'] = [{ wch: 12 }, { wch: 120 }];

// ===================== 公共工具 =====================

// 截取预览画面
function capturePreview(w, h) {
  return new Promise((resolve, reject) => {
    const tmp = document.createElement('iframe');
    tmp.style.cssText = `position:fixed;left:-9999px;width:${w}px;height:${h || 900}px;border:none;`;
    document.body.appendChild(tmp);
    const d = tmp.contentDocument;
    d.open(); d.write(buildHTML()); d.close();

    const done = () => {
      setTimeout(() => {
        html2canvas(d.body, {
          scale: 2, useCORS: true, width: w,
          height: h || d.body.scrollHeight || 900,
          backgroundColor: '#ffffff'
        }).then(canvas => {
          document.body.removeChild(tmp);
          resolve(canvas);
        }).catch(err => {
          document.body.removeChild(tmp);
          reject(err);
        });
      }, 400);
    };

    tmp.onload = done;
    setTimeout(done, 1500); // fallback
  });
}

// 从预览中提取表格
function extractTablesFromPreview() {
  try {
    const d = preview.contentDocument;
    if (!d) return [];
    const tables = d.querySelectorAll('table');
    const result = [];
    tables.forEach(table => {
      const rows = [];
      table.querySelectorAll('tr').forEach(tr => {
        const cells = [];
        tr.querySelectorAll('th, td').forEach(cell => cells.push(cell.innerText.trim()));
        if (cells.length) rows.push(cells);
      });
      if (rows.length) result.push(rows);
    });
    return result;
  } catch(e) { return []; }
}

// 从预览中提取文本
function extractTextFromPreview() {
  try {
    const d = preview.contentDocument;
    return d ? (d.body.innerText || '').trim() : '';
  } catch(e) { return ''; }
}
