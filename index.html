<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>代码编辑器 - 预览与导出</title>

<!-- 导出依赖 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: -apple-system, "Microsoft YaHei", sans-serif;
  background: #1e1e2e;
  color: #cdd6f4;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ===== 顶栏 ===== */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 16px;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}

.topbar h1 {
  font-size: 16px;
  font-weight: 600;
  color: #cba6f7;
}

.btn-group { display: flex; gap: 6px; flex-wrap: wrap; }

button {
  padding: 6px 14px;
  border: 1px solid #45475a;
  border-radius: 6px;
  background: #313244;
  color: #cdd6f4;
  font-size: 13px;
  cursor: pointer;
  transition: background 0.15s;
  white-space: nowrap;
}
button:hover { background: #45475a; }
button.primary { background: #89b4fa; color: #1e1e2e; border-color: #89b4fa; font-weight: 600; }
button.primary:hover { background: #74c7ec; }
button.green { background: #a6e3a1; color: #1e1e2e; border-color: #a6e3a1; font-weight: 600; }
button.green:hover { background: #94e2d5; }

/* ===== 标签栏 ===== */
.tabs {
  display: flex;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}
.tab {
  padding: 8px 20px;
  font-size: 13px;
  cursor: pointer;
  border-bottom: 2px solid transparent;
  color: #6c7086;
  transition: all 0.15s;
  user-select: none;
}
.tab:hover { color: #cdd6f4; }
.tab.active {
  color: #89b4fa;
  border-bottom-color: #89b4fa;
  background: #1e1e2e;
}

/* ===== 主区域 ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
}

/* 编辑器 */
.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  border-right: 2px solid #313244;
  min-width: 0;
}

.editor-pane textarea {
  flex: 1;
  width: 100%;
  padding: 14px;
  background: #1e1e2e;
  color: #cdd6f4;
  border: none;
  outline: none;
  resize: none;
  font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
  font-size: 14px;
  line-height: 1.6;
  tab-size: 2;
}

/* 预览 */
.preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  background: #fff;
}

.preview-label {
  padding: 8px 16px;
  font-size: 12px;
  color: #6c7086;
  background: #181825;
  border-bottom: 1px solid #313244;
  flex-shrink: 0;
}

.preview-pane iframe {
  flex: 1;
  width: 100%;
  border: none;
  background: #fff;
}

/* ===== 导出菜单 ===== */
.export-wrap { position: relative; }
.export-menu {
  display: none;
  position: absolute;
  top: 100%;
  right: 0;
  margin-top: 4px;
  background: #313244;
  border: 1px solid #45475a;
  border-radius: 8px;
  padding: 4px 0;
  z-index: 999;
  min-width: 170px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
}
.export-menu.show { display: block; }
.export-menu button {
  display: block;
  width: 100%;
  text-align: left;
  padding: 8px 16px;
  border: none;
  border-radius: 0;
  background: transparent;
  color: #cdd6f4;
  font-size: 13px;
}
.export-menu button:hover { background: #45475a; }

/* ===== 底栏 ===== */
.bottombar {
  padding: 4px 16px;
  font-size: 12px;
  color: #6c7086;
  background: #181825;
  border-top: 1px solid #313244;
  display: flex;
  justify-content: space-between;
  flex-shrink: 0;
}

/* 响应式 */
@media (max-width: 700px) {
  .main { flex-direction: column; }
  .editor-pane { border-right: none; border-bottom: 2px solid #313244; flex: 1; }
  .preview-pane { flex: 1; }
}
</style>
</head>
<body>

<!-- 顶栏 -->
<div class="topbar">
  <h1>⚡ 代码编辑器</h1>
  <div class="btn-group">
    <button class="primary" onclick="runPreview()">▶ 运行</button>
    <button onclick="clearAll()">清空</button>
    <button onclick="copyCode()">复制</button>
    <div class="export-wrap">
      <button class="green" onclick="toggleMenu()">📦 导出 ▾</button>
      <div class="export-menu" id="exportMenu">
        <button onclick="doExport('html')">💾 导出 HTML</button>
        <button onclick="doExport('pdf')">📄 导出 PDF</button>
        <button onclick="doExport('word')">📝 导出 Word</button>
        <button onclick="doExport('excel')">📊 导出 Excel</button>
        <button onclick="doExport('ppt')">📽️ 导出 PPT</button>
      </div>
    </div>
  </div>
</div>

<!-- 标签栏 -->
<div class="tabs">
  <div class="tab active" data-lang="html" onclick="switchTab(this)">HTML</div>
  <div class="tab" data-lang="css" onclick="switchTab(this)">CSS</div>
  <div class="tab" data-lang="js" onclick="switchTab(this)">JavaScript</div>
</div>

<!-- 主区域 -->
<div class="main">
  <div class="editor-pane">
    <textarea id="editor" spellcheck="false" placeholder="在这里写代码，然后点击「运行」查看效果..."></textarea>
  </div>
  <div class="preview-pane">
    <div class="preview-label">预览区域（点击「运行」刷新）</div>
    <iframe id="preview"></iframe>
  </div>
</div>

<!-- 底栏 -->
<div class="bottombar">
  <span id="statusInfo">HTML | 0 字符</span>
  <span>UTF-8</span>
</div>

<script>
// ========== 状态 ==========
const code = {
  html: `<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea, #764ba2);
      font-family: sans-serif;
    }
    .box {
      background: #fff;
      padding: 50px 70px;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      text-align: center;
    }
    h1 { color: #333; margin-bottom: 8px; }
    p { color: #777; }
    button {
      margin-top: 20px;
      padding: 10px 30px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
    }
    button:hover { background: #5a6fd6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>Hello World 🎉</h1>
    <p>编辑左侧代码，点击运行查看效果</p>
    <button onclick="alert('按钮可以用！')">点我试试</button>
  </div>
</body>
</html>`,
  css: `/* 在这里写 CSS，会注入到 HTML 的 <head> 中 */

body {
  font-family: sans-serif;
}`,
  js: `// 在这里写 JavaScript，会注入到 HTML 的 <body> 末尾

console.log("Hello from JS editor!");`
};

let currentLang = 'html';
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');

// 初始化
editor.value = code.html;
updateStatus();
// 自动运行一次
setTimeout(runPreview, 100);

// ========== 标签切换 ==========
function switchTab(tab) {
  // 保存当前
  code[currentLang] = editor.value;
  // 切换
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  currentLang = tab.dataset.lang;
  editor.value = code[currentLang];
  updateStatus();
}

function updateStatus() {
  const len = editor.value.length;
  document.getElementById('statusInfo').textContent = `${currentLang.toUpperCase()} | ${len} 字符`;
}

editor.addEventListener('input', () => {
  code[currentLang] = editor.value;
  updateStatus();
});

// Tab 键支持
editor.addEventListener('keydown', (e) => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s = editor.selectionStart;
    editor.value = editor.value.substring(0, s) + '  ' + editor.value.substring(editor.selectionEnd);
    editor.selectionStart = editor.selectionEnd = s + 2;
    code[currentLang] = editor.value;
  }
});

// ========== 运行预览 ==========
function runPreview() {
  code[currentLang] = editor.value;
  const fullHTML = buildHTML();
  const doc = preview.contentDocument || preview.contentWindow.document;
  doc.open();
  doc.write(fullHTML);
  doc.close();
}

function buildHTML() {
  let html = code.html.trim();

  // 如果是完整 HTML 文档
  if (html.match(/<html[\s>]/i)) {
    // 注入 CSS
    if (code.css.trim()) {
      const style = `<style>${code.css}</style>`;
      if (html.includes('</head>')) {
        html = html.replace('</head>', style + '</head>');
      } else {
        html = style + html;
      }
    }
    // 注入 JS
    if (code.js.trim()) {
      const script = `<script>${code.js}<\/script>`;
      if (html.includes('</body>')) {
        html = html.replace('</body>', script + '</body>');
      } else {
        html += script;
      }
    }
    return html;
  }

  // 不是完整文档，拼接
  return `<!DOCTYPE html>
<html><head><meta charset="UTF-8"><style>${code.css}</style></head>
<body>${html}<script>${code.js}<\/script></body></html>`;
}

// ========== 工具按钮 ==========
function clearAll() {
  if (!confirm('确定清空所有内容？')) return;
  code.html = '';
  code.css = '';
  code.js = '';
  editor.value = '';
  updateStatus();
  const doc = preview.contentDocument || preview.contentWindow.document;
  doc.open(); doc.write(''); doc.close();
}

function copyCode() {
  navigator.clipboard.writeText(editor.value).then(() => {
    showMsg('已复制到剪贴板 ✓');
  }).catch(() => {
    editor.select();
    document.execCommand('copy');
    showMsg('已复制 ✓');
  });
}

function showMsg(text) {
  const old = document.getElementById('_toast');
  if (old) old.remove();
  const d = document.createElement('div');
  d.id = '_toast';
  d.textContent = text;
  Object.assign(d.style, {
    position:'fixed', top:'16px', left:'50%', transform:'translateX(-50%)',
    padding:'10px 24px', background:'#a6e3a1', color:'#1e1e2e', borderRadius:'8px',
    fontWeight:'600', fontSize:'14px', zIndex:'9999', boxShadow:'0 4px 16px rgba(0,0,0,0.3)'
  });
  document.body.appendChild(d);
  setTimeout(() => d.remove(), 2000);
}

// ========== 导出菜单 ==========
function toggleMenu() {
  document.getElementById('exportMenu').classList.toggle('show');
}
document.addEventListener('click', (e) => {
  if (!e.target.closest('.export-wrap')) {
    document.getElementById('exportMenu').classList.remove('show');
  }
});

// ========== 导出功能 ==========
function doExport(type) {
  document.getElementById('exportMenu').classList.remove('show');
  code[currentLang] = editor.value;

  switch(type) {
    case 'html': exportAsHTML(); break;
    case 'pdf':  exportAsPDF(); break;
    case 'word': exportAsWord(); break;
    case 'excel': exportAsExcel(); break;
    case 'ppt':  exportAsPPT(); break;
  }
}

// ---- HTML ----
function exportAsHTML() {
  const content = buildHTML();
  const blob = new Blob([content], { type: 'text/html;charset=utf-8' });
  saveAs(blob, 'page.html');
  showMsg('HTML 已导出 ✓');
}

// ---- PDF ----
function exportAsPDF() {
  showMsg('正在生成 PDF...');

  // 创建临时 iframe 来渲染
  const tmpFrame = document.createElement('iframe');
  tmpFrame.style.cssText = 'position:fixed;left:-9999px;width:1200px;height:900px;border:none;';
  document.body.appendChild(tmpFrame);

  const doc = tmpFrame.contentDocument;
  doc.open();
  doc.write(buildHTML());
  doc.close();

  tmpFrame.onload = () => {
    setTimeout(() => {
      html2canvas(doc.body, {
        scale: 2,
        useCORS: true,
        width: 1200,
        height: Math.max(doc.body.scrollHeight, 900),
        backgroundColor: '#ffffff'
      }).then(canvas => {
        const { jsPDF } = window.jspdf;
        const imgData = canvas.toDataURL('image/png');
        const pdfW = 210; // A4 mm
        const pdfH = (canvas.height * pdfW) / canvas.width;
        const pdf = new jsPDF('p', 'mm', 'a4');
        pdf.addImage(imgData, 'PNG', 0, 0, pdfW, Math.min(pdfH, 297));

        // 如果内容超过一页
        if (pdfH > 297) {
          let y = -297;
          while (Math.abs(y) < pdfH) {
            pdf.addPage();
            pdf.addImage(imgData, 'PNG', 0, y, pdfW, pdfH);
            y -= 297;
          }
        }

        pdf.save('page.pdf');
        document.body.removeChild(tmpFrame);
        showMsg('PDF 已导出 ✓');
      }).catch(() => {
        document.body.removeChild(tmpFrame);
        showMsg('PDF 导出失败，请重试');
      });
    }, 500);
  };
}

// ---- Word (.doc via HTML) ----
function exportAsWord() {
  const htmlContent = buildHTML();

  // 用 HTML 格式生成 .doc（Word 可以打开 HTML）
  const wordContent = `
    <html xmlns:o="urn:schemas-microsoft-com:office:office"
          xmlns:w="urn:schemas-microsoft-com:office:word"
          xmlns="http://www.w3.org/TR/REC-html40">
    <head><meta charset="UTF-8">
    <style>
      @page { size: A4; margin: 2cm; }
      body { font-family: SimSun, serif; font-size: 12pt; }
      pre { background: #f5f5f5; padding: 12px; border: 1px solid #ddd; border-radius: 4px;
            font-family: Consolas, monospace; font-size: 10pt; white-space: pre-wrap; word-wrap: break-word; }
      h1 { color: #333; border-bottom: 2px solid #667eea; padding-bottom: 8px; }
      .section { margin-bottom: 20px; }
      .label { font-weight: bold; color: #555; margin-bottom: 4px; }
    </style>
    </head><body>
      <h1>代码导出文档</h1>
      <p style="color:#888;">导出时间：${new Date().toLocaleString('zh-CN')}</p>
      ${code.html.trim() ? `<div class="section"><div class="label">HTML 代码：</div><pre>${escapeHtml(code.html)}</pre></div>` : ''}
      ${code.css.trim() ? `<div class="section"><div class="label">CSS 代码：</div><pre>${escapeHtml(code.css)}</pre></div>` : ''}
      ${code.js.trim() ? `<div class="section"><div class="label">JavaScript 代码：</div><pre>${escapeHtml(code.js)}</pre></div>` : ''}
      <div class="section"><div class="label">预览效果（HTML 源码）：</div><pre>${escapeHtml(htmlContent)}</pre></div>
    </body></html>`;

  const blob = new Blob(['\ufeff' + wordContent], { type: 'application/msword' });
  saveAs(blob, 'code-export.doc');
  showMsg('Word 已导出 ✓');
}

// ---- Excel ----
function exportAsExcel() {
  // 提取预览中的表格数据，如果没有表格则导出代码文本
  const tmpFrame = document.createElement('iframe');
  tmpFrame.style.cssText = 'position:fixed;left:-9999px;width:800px;height:600px;';
  document.body.appendChild(tmpFrame);
  const doc = tmpFrame.contentDocument;
  doc.open(); doc.write(buildHTML()); doc.close();

  setTimeout(() => {
    const tables = doc.querySelectorAll('table');
    const wb = XLSX.utils.book_new();

    if (tables.length > 0) {
      // 导出页面中的表格
      tables.forEach((table, i) => {
        const ws = XLSX.utils.table_to_sheet(table);
        XLSX.utils.book_append_sheet(wb, ws, `表格${i + 1}`);
      });
    } else {
      // 没有表格，把代码作为文本导出
      const data = [
        ['类型', '代码内容'],
        ['HTML', code.html],
        ['CSS', code.css],
        ['JavaScript', code.js]
      ];
      const ws = XLSX.utils.aoa_to_sheet(data);
      ws['!cols'] = [{ wch: 12 }, { wch: 100 }];
      XLSX.utils.book_append_sheet(wb, ws, '代码');

      // 提取页面文本内容
      const textContent = doc.body.innerText.trim();
      if (textContent) {
        const lines = textContent.split('\n').map(line => [line]);
        const ws2 = XLSX.utils.aoa_to_sheet([['页面文本内容'], ...lines]);
        ws2['!cols'] = [{ wch: 100 }];
        XLSX.utils.book_append_sheet(wb, ws2, '页面内容');
      }
    }

    XLSX.writeFile(wb, 'export.xlsx');
    document.body.removeChild(tmpFrame);
    showMsg('Excel 已导出 ✓');
  }, 300);
}

// ---- PPT (简易 HTML 方案) ----
function exportAsPPT() {
  showMsg('正在生成 PPT...');

  // 先截图预览内容
  const tmpFrame = document.createElement('iframe');
  tmpFrame.style.cssText = 'position:fixed;left:-9999px;width:1280px;height:720px;border:none;';
  document.body.appendChild(tmpFrame);
  const doc = tmpFrame.contentDocument;
  doc.open(); doc.write(buildHTML()); doc.close();

  tmpFrame.onload = () => {
    setTimeout(() => {
      html2canvas(doc.body, {
        scale: 2,
        width: 1280,
        height: 720,
        backgroundColor: '#ffffff'
      }).then(canvas => {
        const imgData = canvas.toDataURL('image/png');

        // 生成简易 PPT（用 SVG + HTML 嵌入方案）
        // 这里用 HTML 格式的 .pptx 替代方案
        const pptHTML = `
          <html xmlns:o="urn:schemas-microsoft-com:office:office"
                xmlns:p="urn:schemas-microsoft-com:office:powerpoint"
                xmlns="http://www.w3.org/TR/REC-html40">
          <head><meta charset="UTF-8">
          <xml><o:DocumentProperties><o:Slides>2</o:Slides></o:DocumentProperties></xml>
          <style>
            @page { size: 25.4cm 19.05cm; margin: 0; }
            .slide { page-break-after: always; width: 25.4cm; height: 19.05cm;
                     display: flex; flex-direction: column; justify-content: center;
                     align-items: center; padding: 2cm; }
            h1 { font-size: 36pt; color: #333; margin-bottom: 20px; }
            p { font-size: 16pt; color: #666; }
            pre { font-size: 9pt; background: #f5f5f5; padding: 16px;
                  border-radius: 8px; max-width: 100%; overflow: hidden;
                  font-family: Consolas, monospace; white-space: pre-wrap; }
            img { max-width: 90%; max-height: 70%; object-fit: contain; }
          </style>
          </head><body>
            <div class="slide" style="background:linear-gradient(135deg,#667eea,#764ba2);">
              <h1 style="color:#fff;">代码预览</h1>
              <p style="color:rgba(255,255,255,0.8);">${new Date().toLocaleString('zh-CN')}</p>
            </div>
            <div class="slide">
              <h1>预览截图</h1>
              <img src="${imgData}" />
            </div>
            <div class="slide">
              <h1 style="font-size:24pt;align-self:flex-start;">HTML 代码</h1>
              <pre>${escapeHtml(code.html.substring(0, 2000))}</pre>
            </div>
          </body></html>`;

        const blob = new Blob(['\ufeff' + pptHTML], { type: 'application/vnd.ms-powerpoint' });
        saveAs(blob, 'slides.ppt');
        document.body.removeChild(tmpFrame);
        showMsg('PPT 已导出 ✓');
      }).catch(() => {
        document.body.removeChild(tmpFrame);
        showMsg('PPT 导出失败');
      });
    }, 500);
  };
}

// ========== 工具函数 ==========
function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
